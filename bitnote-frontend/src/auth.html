    <script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // const firebaseConfig = {
        //     apiKey: "YOUR_API_KEY",
        //     authDomain: "YOUR_PROJECT.firebaseapp.com",
        //     projectId: "YOUR_PROJECT_ID",
        //     appId: "YOUR_APP_ID",
        // };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById("googleBtn").onclick = async () => {
            try {
                // 1️⃣ Google popup
                const result = await signInWithPopup(auth, provider);

                // 2️⃣ Get ID token
                const idToken = await result.user.getIdToken();

                const pic = await result.user.photoURL;
                localStorage.setItem("image", pic);

                // 3️⃣ Send token to backend
                const res = await fetch("http://localhost:8000/auth/google", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        id_token: idToken,
                        username: result.user.displayName,
                        pic: pic
                    }),
                });

                if (!res.ok) {
                    const text = await res.text(); // read raw error
                    console.error("Backend error:", text);
                    throw new Error("Backend error");
                }
                const data = await res.json();
                console.log(data);
                // alert(pic); 

                if (data.status === "logged_in") {
                    localStorage.setItem("isLoggedIn", "true");
                    sessionStorage.setItem("user_id", data.user_id);
                    window.location.href = "home.html";
                }

            } catch (err) {
                console.error(err);
                alert("Google login failed");
            }
        };
    </script>

    <script>
        const loginTab = document.getElementById("loginTab");
        const signupTab = document.getElementById("signupTab");

        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");

        const authSubmitBtn = document.getElementById("authSubmitBtn");

        // ---- Switch to Login ----
        loginTab.addEventListener("click", () => {
            // Forms
            loginForm.classList.remove("hidden");
            signupForm.classList.add("hidden");

            // Tab styles
            loginTab.classList.add(
                "bg-white",
                "dark:bg-[#1A2230]",
                "text-[#111318]",
                "dark:text-white",
                "shadow-[0_1px_3px_rgba(0,0,0,0.1)]"
            );
            signupTab.classList.remove(
                "bg-white",
                "dark:bg-[#1A2230]",
                "text-[#111318]",
                "dark:text-white",
                "shadow-[0_1px_3px_rgba(0,0,0,0.1)]"
            );

            // Muted inactive tab
            signupTab.classList.add(
                "text-[#616f89]",
                "dark:text-slate-400"
            );

            // Button text
            authSubmitBtn.textContent = "Log In";
        });

        // ---- Switch to Sign Up ----
        signupTab.addEventListener("click", () => {
            // Forms
            signupForm.classList.remove("hidden");
            loginForm.classList.add("hidden");

            // Tab styles
            signupTab.classList.add(
                "bg-white",
                "dark:bg-[#1A2230]",
                "text-[#111318]",
                "dark:text-white",
                "shadow-[0_1px_3px_rgba(0,0,0,0.1)]"
            );
            loginTab.classList.remove(
                "bg-white",
                "dark:bg-[#1A2230]",
                "text-[#111318]",
                "dark:text-white",
                "shadow-[0_1px_3px_rgba(0,0,0,0.1)]"
            );

            // Muted inactive tab
            loginTab.classList.add(
                "text-[#616f89]",
                "dark:text-slate-400"
            );

            // Button text
            authSubmitBtn.textContent = "Create Account";
        });
    </script>

    <script>
        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("signup-username").value.trim();
            const email = document.getElementById("signup-email").value.trim();
            const password = document.getElementById("signup-password").value;
            const confirmPassword = document.getElementById("signup-confirm-password").value;

            const passwordError = document.getElementById("password-error");
            const passwordInput = document.getElementById("signup-password");
            const confirmInput = document.getElementById("signup-confirm-password");

            // Reset
            passwordError.classList.add("hidden");
            passwordInput.classList.remove("border-red-500");
            confirmInput.classList.remove("border-red-500");

            // Validation rules
            const passwordRegex =
                /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

            if (!passwordRegex.test(password)) {
                passwordError.textContent =
                    "Password must be 8+ chars, include uppercase, lowercase, number & special character.";
                passwordError.classList.remove("hidden");
                passwordInput.classList.add("border-red-500");
                return;
            }

            if (password !== confirmPassword) {
                passwordError.textContent = "Passwords do not match.";
                passwordError.classList.remove("hidden");
                confirmInput.classList.add("border-red-500");
                return;
            }

            // If valid → call backend
            const res = await fetch("http://localhost:8000/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password }),
            });

            const data = await res.json();

            if (!res.ok) {
                passwordError.textContent = data.detail || "Signup failed.";
                passwordError.classList.remove("hidden");
                return;
            }

            alert("Signup successful. Please log in.");
            signupForm.reset();
        });
    </script>
